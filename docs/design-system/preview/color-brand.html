<!doctype html>
<!-- @dsCard group="Colors" name="Colors — brand marketing" subtitle="vivid greens + ink surfaces" viewport="700x220" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--brand-ink-1);color:var(--brand-white);font-family:var(--font-sans);}
  body{padding:20px;}
  .row{display:flex;gap:10px;}
  .swatch{flex:1;border-radius:var(--radius-lg);overflow:hidden;}
  .fill{height:100px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display-brand);font-weight:800;font-size:20px;}
  .meta{padding:10px 12px;background:rgba(255,255,255,.06);}
  .name{font-size:12px;font-weight:600;color:var(--brand-white);}
  .val{font-size:11px;color:rgba(255,255,255,.6);font-family:var(--font-mono);margin-top:2px;}
</style></head>
<body>
  <div class="row">
    <div class="swatch"><div class="fill" style="background:var(--brand-green);color:#0B1B18;">brand green</div><div class="meta"><div class="name">brand-green</div><div class="val">#1DEF3B · hero fills</div></div></div>
    <div class="swatch"><div class="fill" style="background:var(--brand-green-soft);color:#0B1B18;">pistachio</div><div class="meta"><div class="name">brand-green-soft</div><div class="val">#9DE85B · large fields</div></div></div>
    <div class="swatch"><div class="fill" style="background:var(--brand-teal);color:#0B1B18;">teal</div><div class="meta"><div class="name">brand-teal</div><div class="val">#33D1AD</div></div></div>
    <div class="swatch"><div class="fill" style="background:var(--brand-ink-2);color:var(--brand-green);border:1px solid rgba(255,255,255,.08);">ink</div><div class="meta"><div class="name">ink-2</div><div class="val">#0D201D · canvas</div></div></div>
    <div class="swatch"><div class="fill" style="background:var(--brand-ink-1);color:var(--brand-green);border:1px solid rgba(255,255,255,.08);">deep ink</div><div class="meta"><div class="name">ink-1</div><div class="val">#0B1B18 · hero bg</div></div></div>
  </div>
</body></html>
