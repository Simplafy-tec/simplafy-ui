<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--color-muted);color:var(--color-foreground);font-family:var(--font-sans);padding:24px;}
  .row{display:flex;gap:14px;}
  .card{flex:1;background:var(--color-card);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:20px;box-shadow:var(--shadow-sm);}
  .label{font-size:13px;color:var(--color-muted-foreground);}
  .value{font-family:var(--font-display);font-weight:700;font-size:28px;letter-spacing:-0.01em;margin-top:4px;}
  .trend{margin-top:6px;display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;}
  .up{color:var(--color-success);}
  .dn{color:var(--color-destructive);}
  .icon{width:40px;height:40px;border-radius:var(--radius-lg);background:color-mix(in oklab, var(--color-primary) 10%, transparent);color:var(--color-primary);display:flex;align-items:center;justify-content:center;font-weight:700;float:right;margin-top:-6px;}
</style></head>
<body>
  <div class="row">
    <div class="card">
      <div class="icon">R$</div>
      <div class="label">Receita do mês</div>
      <div class="value">R$ 187.420</div>
      <div class="trend up">▲ 12,4% vs. mês passado</div>
    </div>
    <div class="card">
      <div class="icon">⧗</div>
      <div class="label">Contatos ativos</div>
      <div class="value">1.284</div>
      <div class="trend up">▲ 3,1% semana</div>
    </div>
    <div class="card">
      <div class="icon">✕</div>
      <div class="label">Taxa de abandono</div>
      <div class="value">4,7%</div>
      <div class="trend dn">▼ 0,8% semana</div>
    </div>
  </div>
</body></html>
