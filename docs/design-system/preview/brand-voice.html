<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:var(--font-sans);background:var(--color-card);color:var(--color-foreground);padding:18px 22px;font-size:13px;line-height:1.5}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.col h4{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin:0 0 8px;color:var(--color-muted-foreground)}
.pill{display:inline-block;background:color-mix(in oklab,var(--color-primary) 12%,transparent);color:var(--color-primary);font-weight:600;padding:3px 10px;border-radius:999px;font-size:11px;margin:2px 4px 2px 0}
.x{display:inline-block;background:color-mix(in oklab,var(--color-destructive) 12%,transparent);color:var(--color-destructive);font-weight:600;padding:3px 10px;border-radius:999px;font-size:11px;margin:2px 4px 2px 0;text-decoration:line-through;text-decoration-color:color-mix(in oklab,var(--color-destructive) 60%,transparent)}
</style></head><body>
<div class="grid">
  <div class="col">
    <h4>Fale assim ✓</h4>
    <span class="pill">Simplifique sua agenda</span>
    <span class="pill">Quero simplificar agora</span>
    <span class="pill">Venda mais, trabalhe menos</span>
    <span class="pill">Sem estresse</span>
    <span class="pill">No seu ritmo</span>
    <span class="pill">Fale com Fy</span>
  </div>
  <div class="col">
    <h4>Evite ✗</h4>
    <span class="x">Revolucionário</span>
    <span class="x">Disruptivo</span>
    <span class="x">Solução definitiva</span>
    <span class="x">Utilizador</span>
    <span class="x">Click aqui</span>
    <span class="x">Ninja / rockstar</span>
  </div>
</div>
</body></html>
