<!doctype html>
<!-- @dsCard group="Type" name="Type — brand (Causten)" subtitle="Causten — display/hero family" viewport="700x200" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);padding:24px;}
  .row{display:flex;gap:14px;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--color-border);}
  .row:last-child{border-bottom:0;}
  .tag{width:90px;color:var(--color-muted-foreground);font-size:11px;font-family:var(--font-mono);flex-shrink:0;padding-top:6px;}
  .spec{color:var(--color-foreground);}
</style></head>
<body>
  <div class="row"><div class="tag">hero · 64/800</div><div class="spec ds-hero">Simplafy</div></div>
  <div class="row"><div class="tag">display · 48/700</div><div class="spec ds-display">Agentes que funcionam</div></div>
  <div class="row"><div class="tag">family</div><div class="spec" style="font-family:var(--font-display-brand);font-size:13px;">Causten — brand display (Light · Regular · Medium · SemiBold · Bold · ExtraBold · Black)</div></div>
</body></html>
