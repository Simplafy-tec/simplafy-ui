<!doctype html>

<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);padding:24px;display:flex;align-items:center;justify-content:center;}
  .row{display:flex;gap:32px;align-items:center;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .name{font-size:11px;font-weight:600;}
  .val{font-size:10px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
  .logo{height:44px;display:flex;align-items:center;}
  .dark{background:var(--brand-ink-1);padding:8px 14px;border-radius:10px;}

<body>
  <div class="row">
    <div class="cell"><div class="logo"><img src="../assets/logos/simplafy_BlackGreen.svg" style="height:36px;"></div><div class="name">simplafy</div><div class="val">parent · BlackGreen</div></div>
    <div class="cell"><div class="logo"><img src="../assets/logos/saude_BlackGreen.svg" style="height:36px;"></div><div class="name">saúde</div><div class="val">clinical</div></div>
    <div class="cell"><div class="logo"><img src="../assets/logos/seguros_BlackGreen.svg" style="height:36px;"></div><div class="name">seguros</div><div class="val">brokers</div></div>
    <div class="cell"><div class="logo"><img src="../assets/logos/agro_BlackGreen.svg" style="height:36px;"></div><div class="name">agro</div><div class="val">agribiz</div></div>
    <div class="cell"><div class="logo dark"><img src="../assets/logos/fy_icon_WhiteGreen.svg" style="height:32px;"></div><div class="name">fy icon</div><div class="val">symbol</div></div>
  </div>
