<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
  body{padding:20px;}
  .row{display:flex;gap:10px;}
  .swatch{flex:1;border-radius:var(--radius-lg);border:1px solid var(--color-border);overflow:hidden;box-shadow:var(--shadow-sm);}
  .fill{height:80px;}
  .meta{padding:10px 12px;background:var(--color-card);}
  .name{font-size:12px;font-weight:600;}
  .val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);margin-top:2px;}
</style></head>
<body>
  <div class="row">
    <div class="swatch"><div class="fill" style="background:var(--color-background);border-bottom:1px solid var(--color-border);"></div><div class="meta"><div class="name">background</div><div class="val">oklch(1 0 0)</div></div></div>
    <div class="swatch"><div class="fill" style="background:var(--color-card);border-bottom:1px solid var(--color-border);"></div><div class="meta"><div class="name">card</div><div class="val">oklch(1 0 0)</div></div></div>
    <div class="swatch"><div class="fill" style="background:var(--color-muted);"></div><div class="meta"><div class="name">muted</div><div class="val">oklch(.97 .002 265)</div></div></div>
    <div class="swatch"><div class="fill" style="background:var(--color-border);"></div><div class="meta"><div class="name">border / input</div><div class="val">oklch(.92 .004 265)</div></div></div>
    <div class="swatch"><div class="fill" style="background:var(--color-muted-foreground);"></div><div class="meta"><div class="name">muted-fg</div><div class="val">oklch(.55 .01 265)</div></div></div>
    <div class="swatch"><div class="fill" style="background:var(--color-foreground);"></div><div class="meta"><div class="name">foreground</div><div class="val">oklch(.145 .02 265)</div></div></div>
  </div>
</body></html>
