<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
  body{padding:20px;}
  .row{display:flex;gap:10px;align-items:flex-end;}
  .swatch{flex:1;border-radius:var(--radius-lg);border:1px solid var(--color-border);overflow:hidden;box-shadow:var(--shadow-sm);}
  .fill{height:96px;}
  .meta{padding:10px 12px;background:var(--color-card);}
  .name{font-size:12px;font-weight:600;color:var(--color-foreground);}
  .val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);margin-top:2px;}
  .dot{display:inline-block;width:10px;height:10px;border-radius:999px;background:var(--color-primary);vertical-align:middle;margin-right:6px;}
</style></head>
<body>
  <div class="row">
    <div class="swatch">
      <div class="fill" style="background:linear-gradient(135deg,var(--color-primary),var(--color-primary-gradient-end));"></div>
      <div class="meta"><div class="name"><span class="dot"></span>Primary (gradient)</div><div class="val">oklch(.72 .19 150) → #34D399</div></div>
    </div>
    <div class="swatch">
      <div class="fill" style="background:var(--color-primary);"></div>
      <div class="meta"><div class="name">Primary — #22C55E</div><div class="val">oklch(0.72 0.19 150)</div></div>
    </div>
    <div class="swatch">
      <div class="fill" style="background:var(--color-primary-hover);"></div>
      <div class="meta"><div class="name">Primary Hover</div><div class="val">#16A34A</div></div>
    </div>
    <div class="swatch">
      <div class="fill" style="background:var(--color-primary);opacity:.10;"></div>
      <div class="meta"><div class="name">Primary / 10% (tint)</div><div class="val">sidebar-accent, menu hover</div></div>
    </div>
    <div class="swatch">
      <div class="fill" style="background:var(--color-primary);opacity:.20;"></div>
      <div class="meta"><div class="name">Primary / 20% (ring)</div><div class="val">focus ring, 3px halo</div></div>
    </div>
  </div>
</body></html>
