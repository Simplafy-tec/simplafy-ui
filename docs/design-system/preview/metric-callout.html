<!doctype html>
<!-- @dsCard group="Brand" name="Metric callout" subtitle="Fórmula de número + label curto" viewport="700x130" --><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:var(--font-sans);background:var(--color-card);color:var(--color-foreground);padding:22px;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.m{padding:14px 16px;border:1px solid var(--color-border);border-radius:14px;background:var(--color-card)}
.n{font-family:var(--font-display);font-size:30px;font-weight:700;letter-spacing:-0.02em;color:var(--color-primary);line-height:1}
.l{font-size:12px;color:var(--color-muted-foreground);margin-top:6px;line-height:1.35}
</style></head><body>
<div class="grid">
  <div class="m"><div class="n">−67%</div><div class="l">faltas em 4 meses</div></div>
  <div class="m"><div class="n">+30</div><div class="l">leads qualificados por dia</div></div>
  <div class="m"><div class="n">90s</div><div class="l">para reagendar casos urgentes</div></div>
  <div class="m"><div class="n">3.000</div><div class="l">segurados ativos</div></div>
</div>
</body></html>
