<!doctype html>
<!-- @dsCard group="Brand" name="Headline recipes" subtitle="Promessa · benefício · CTA" viewport="700x250" --><html lang="pt-BR"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:var(--font-sans);background:var(--color-card);color:var(--color-foreground);padding:20px 22px;font-size:13px}
.row{padding:12px 0;border-bottom:1px dashed var(--color-border)}
.row:last-child{border:0}
.tag{display:inline-block;font-family:var(--font-mono);font-size:10px;color:var(--color-muted-foreground);background:var(--color-muted);padding:2px 8px;border-radius:4px;margin-right:10px;vertical-align:middle}
.h{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:-0.01em;display:inline}
.h em{font-style:normal;color:var(--color-primary)}
</style></head><body>
<div class="row"><span class="tag">PROMESSA</span><span class="h">Seu negócio funcionando <em>simples, rápido e sem estresse.</em></span></div>
<div class="row"><span class="tag">BENEFÍCIO</span><span class="h">Venda mais, <em>trabalhe menos.</em></span></div>
<div class="row"><span class="tag">AGENDA</span><span class="h">Sua agenda cheia, <em>sem estresse.</em></span></div>
<div class="row"><span class="tag">PRODUTO</span><span class="h">Produtor bem assistido, <em>cooperativa eficiente.</em></span></div>
<div class="row"><span class="tag">CTA</span><span class="h">Quero simplificar agora · Cadastre-se e comece a usar · Fale com Fy</span></div>
</body></html>
