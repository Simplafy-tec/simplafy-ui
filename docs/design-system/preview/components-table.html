<!doctype html>
<!-- @dsCard group="Components" name="Tables" subtitle="row, header, inline badges" viewport="700x220" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);padding:24px;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{text-align:left;padding:8px 12px;color:var(--color-muted-foreground);font-weight:500;font-size:13px;border-bottom:1px solid var(--color-border);}
  td{padding:10px 12px;border-bottom:1px solid var(--color-border);}
  tr:last-child td{border-bottom:0;}
  tr:hover td{background:color-mix(in oklab, var(--color-muted) 50%, transparent);}
  .badge{display:inline-flex;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;}
  .b-success{background:var(--color-success);color:var(--color-success-foreground);}
  .b-warning{background:var(--color-warning);color:var(--color-warning-foreground);}
  .b-teal{background:var(--color-teal);color:var(--color-teal-foreground);}
  .dots{color:var(--color-muted-foreground);cursor:pointer;}
</style></head>
<body>
  <table>
    <thead><tr><th>Nome</th><th>Canal</th><th>Status</th><th>Última mensagem</th><th></th></tr></thead>
    <tbody>
      <tr><td>Maria Silva</td><td><span class="badge b-teal">WhatsApp</span></td><td><span class="badge b-success">Ativo</span></td><td>há 2 min</td><td class="dots">⋯</td></tr>
      <tr><td>João Oliveira</td><td><span class="badge b-teal">WhatsApp</span></td><td><span class="badge b-warning">Pendente</span></td><td>há 18 min</td><td class="dots">⋯</td></tr>
      <tr><td>Ana Costa</td><td><span class="badge b-teal">WhatsApp</span></td><td><span class="badge b-success">Ativo</span></td><td>há 1 h</td><td class="dots">⋯</td></tr>
    </tbody>
  </table>
</body></html>
