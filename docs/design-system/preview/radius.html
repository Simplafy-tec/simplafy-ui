<!doctype html>
<!-- @dsCard group="Spacing" name="Radius scale" subtitle="sm 6 · md 8 · btn 10 · lg 12 · xl 16 · full" viewport="700x200" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);padding:24px;}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:72px;height:72px;background:linear-gradient(135deg,var(--color-primary),var(--color-primary-gradient-end));}
  .name{font-size:11px;font-weight:600;}
  .val{font-size:10px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><div class="box" style="border-radius:var(--radius-sm);"></div><div class="name">sm</div><div class="val">6px</div></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-md);"></div><div class="name">md</div><div class="val">8px · input</div></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-btn);"></div><div class="name">btn</div><div class="val">10px · Button</div></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-lg);"></div><div class="name">lg</div><div class="val">12px · popover</div></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-xl);"></div><div class="name">xl</div><div class="val">16px · Card</div></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-full);"></div><div class="name">full</div><div class="val">9999 · pill</div></div>
  </div>
</body></html>
