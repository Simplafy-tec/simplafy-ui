<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);padding:24px;}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .tile{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-lg);background:var(--color-card);min-width:84px;}
  i[data-lucide]{stroke:var(--color-foreground);width:20px;height:20px;stroke-width:1.5;}
  .n{font-size:10px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
</style></head>
<body>
  <div class="row">
    <div class="tile"><i data-lucide="users"></i><div class="n">users</div></div>
    <div class="tile"><i data-lucide="bot"></i><div class="n">bot</div></div>
    <div class="tile"><i data-lucide="message-square"></i><div class="n">msg</div></div>
    <div class="tile"><i data-lucide="calendar"></i><div class="n">calendar</div></div>
    <div class="tile"><i data-lucide="settings"></i><div class="n">settings</div></div>
    <div class="tile"><i data-lucide="trending-up"></i><div class="n">trend</div></div>
    <div class="tile"><i data-lucide="search"></i><div class="n">search</div></div>
    <div class="tile"><i data-lucide="bell"></i><div class="n">bell</div></div>
    <div class="tile"><i data-lucide="plus"></i><div class="n">plus</div></div>
    <div class="tile"><i data-lucide="more-horizontal"></i><div class="n">⋯</div></div>
  </div>
  <script src="https://unpkg.com/lucide@0.509.0/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body></html>
